<!DOCTYPE html>
<html>
<head>
    <title>Блочная верстка</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            font-size: 14px;
        }
        
        #container {
            margin: auto;
            text-align: center;
            width: 80%;
            height: 100%;
        }
        
        #header {
            border: 5px solid orange;
            width: 100%;
            height: 80px;
            margin-bottom: 5px;
        }
        
        #sidebar {
            border: 5px solid red;
            float: left;
            width: 20%;
            height: 70%;
            margin-right: 20px;
        }
        
        #content {
            border: 5px solid green;
            position: relative;
            left: 22%;
            width: 78%;
            height: 70%;
        }
        
        #footer {
            border: 5px solid aqua;
            width: 100%;
            height: 50px;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div id="container">
        <div id="header">header (шапка сайта)</div>
        <div id="sidebar">левая панель</div>
        <div id="content">содержимое</div>
        <div id="footer">footer (подвал)</div>
    </div>
</body>
</html>
