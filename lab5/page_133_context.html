<!DOCTYPE html>
<html>
<head>
    <title>Контекстный селектор</title>
    <style>
        p b {
            border-bottom: 3px dotted red; /* обрамление снизу */
        }
    </style>
</head>
<body>
    <p>Виды <b>сел</b>ект<b>ор</b>ов</p>
    <p><i>Контекстный</i> селектор относится к группе <b>сложных</b> селекторов.</p>
    <p><i>Обрамление снизу</i> распространяется на все теги <b>&lt;b&gt;</b>, расположенные в контейнере <b>&lt;p&gt;</b>.</p>
</body>
</html>
