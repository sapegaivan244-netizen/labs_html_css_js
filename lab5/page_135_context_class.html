<!DOCTYPE html>
<html>
<head>
    <title>Контекстный селектор</title>
    <style>
        a {
            color: white;
            background-color: magenta;
            padding: 10px; /* внутренний отступ */
        }
        .menu {
            width: 100%;
            text-align: center;
        }
        .menu a {
            width: 50px;
            display: inline-block; /* отображение в виде блока */
            text-decoration: none;
            border: solid 3px white; /* обрамление */
        }
    </style>
</head>
<body>
    <p class="menu">
        <a href="#">селектор тега</a>
        <a href="#">селектор атрибута</a>
        <a href="#">селектор класса</a>
        <a href="#">универсальный селектор</a>
    </p>
</body>
</html>
