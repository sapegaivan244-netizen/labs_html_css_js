<!DOCTYPE html>
<html>
<head>
    <title>Селекторы идентификатора</title>
    <style>
        #logo {
            float: left;
            background-image: url("image/5-11.png");
            background-position: center top;
            background-size: contain;
            background-repeat: no-repeat;
            width: 40%;
            height: 50px;
        }
        #logo_text {
            color: white;
            text-align: center;
            text-shadow: 1px 1px 2px black, 0 0 15px blue;
        }
    </style>
</head>
<body>
    <div id="logo" title="логотип"></div>
    <p id="logo_text">В качестве логотипа использовался блок с фоновым изображением.</p>
</body>
</html>
