<!DOCTYPE html>
<html>
<head>
    <title>Селекторы атрибутов</title>
    <style>
        [title] {
            text-decoration: underline; /* подчеркивание текста */
        }
        input[type] {
            background-color: green; /* цвет фона элемента */
            color: white;
        }
    </style>
</head>
<body>
    <h1 title="Селектор атрибутов">Виды селекторов</h1>
    <ul type="square">
        <li>универсальный</li>
        <li>тега</li>
    </ul>
    <input type="submit" value="тест">
    <p title="особенности селектора атрибутов">Теги, у которых задан атрибут title, подчеркиваются.</p>
</body>
</html>
