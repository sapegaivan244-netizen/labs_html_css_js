<!DOCTYPE html>
<html>
<head>
    <title>Дочерний селектор</title>
    <style>
        p > i {
            margin-top: 20px; /* отступ сверху */
            border-top: 3px inset red; /* обрамление сверху */
        }
    </style>
</head>
<body>
    <p>Виды <i><u>селектор</u></i> ввод</p>
    <p><b>Дочерний</b> селектор относится к группе <i>сложных</i> селекторов.</p>
    <p><b>Обрамление сверху НЕ распространяется <i> на тег &lt;i&gt;</i></b>, который расположен в контейнере &lt;b&gt;.</p>
</body>
</html>
