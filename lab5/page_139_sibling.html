<!DOCTYPE html>
<html>
<head>
    <title>Родственные селекторы</title>
    <style>
        p ~ h3 {
            width: 260px;
            height: 80px;
            overflow-y: scroll;
            scrollbar-arrow-color: fuchsia;
            scrollbar-face-color: blue;
            scrollbar-base-color: aqua;
            border: solid aqua;
            padding: 6px;
        }
    </style>
</head>
<body>
    <p>Виды селекторов.</p>
    <h3>Родственные селекторы относятся к группе...</h3>
    <div>...<h3>сложных селекторов</h3></div>
    <h3>Свойства блока объявлений распространяются на все теги &lt;h3&gt;, которые расположены после &lt;p&gt;.</h3>
</body>
</html>
