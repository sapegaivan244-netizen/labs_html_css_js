<!DOCTYPE html>
<html>
<head>
    <title>Date</title>
</head>
<body>
    <script>
        var theDate = new Date();
        document.write("<table cellpadding=5 width=100% border=0>" +
                       "<tr><td width=95% bgcolor=gray align=left>" +
                       "<font color=red>Date: " + theDate + "</font></td></tr></table>");
    </script>
</body>
</html>
