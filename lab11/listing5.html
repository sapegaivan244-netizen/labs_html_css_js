<!DOCTYPE html>
<html>
<head>
    <title>Операции над объектами. Свойства текстового поля</title>
    <script>
        function propobj(obj) {
            var result = "";
            for (var i in obj) {
                result += obj.data.value + "." + obj.data[i] + "\r\n";
            }
            result += "\n\r";
            form1.data.value = result;
        }
    </script>
</head>
<body bgcolor="f8f8ff">
    <center>
        <h4>Определение свойств объектов</h4>
        <form name="form1">
            <input type="button" value="Выполнить" onClick="propobj(form1)">
            <hr>
            <textarea name="data" cols="30" rows="10" id="1">Текст</textarea>
            <hr>
            <input type="reset" value="очистить">
        </form>
    </center>
</body>
</html>
