<!DOCTYPE html>
<html>
<body>
    <script>
        var lastName = prompt('Введите вашу фамилию:');

        var firstName = prompt('Введите ваше имя:');

        var middleName = prompt('Введите ваше отчество:');

        var age = prompt('Введите ваш возраст в годах:');

        var gender = confirm('Ваш пол - мужской?');


        var days = age * 365;
        var futureAge = Number(age) + 5;
        
        var genderText = gender ? 'мужской' : 'женский';
        var pension = (gender && age >= 60) || (!gender && age >= 55) ? 'да' : 'нет';

        alert('ваше ФИО: ' + lastName + ' ' + firstName + ' ' + middleName +
              '\nваш возраст в годах: ' + age +
              '\nваш возраст в днях: ' + days +
              '\nчерез 5 лет вам будет: ' + futureAge +
              '\nваш пол: ' + genderText +
              '\nвы на пенсии: ' + pension);
    </script>
</body>
</html>
