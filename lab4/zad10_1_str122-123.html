<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Относительные единицы измерения</title>
</head>
<body>
    <!-- Относительные единицы из учебника [1, 122-123] -->
    <p style="font-size: 2em;">Размер 2 em</p>
    <p style="font-size: 1.5em;">Размер 1.5 em</p>
    <p style="font-size: 2ex;">Размер 2 ex</p>
    <p style="font-size: 2.5ex;">Размер 2.5 ex</p>
    <p style="font-size: 25px;">Размер 25 пикселов</p>
    <p style="font-size: 200%;">Размер 200%</p>
    
    <!-- Дополнительные примеры -->
    <div style="margin-top: 30px; border-top: 2px solid #ccc; padding-top: 20px;">
        <h3>Современные относительные единицы</h3>
        <p style="font-size: 2rem;">Размер 2 rem (относительно корневого элемента)</p>
        <p style="font-size: 2vh;">Размер 2vh (2% от высоты окна)</p>
        <p style="font-size: 2vw;">Размер 2vw (2% от ширины окна)</p>
    </div>
</body>
</html>
