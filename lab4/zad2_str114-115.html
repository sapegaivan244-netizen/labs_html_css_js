<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Пример включенной таблицы стилей</title>
</head>
<body>
    <!-- Встроенные стили из учебника [1, 114] -->
    <p style="font: 20 Garamond;">
        Включенная таблица стилей и атрибут 
        <span style="font: 26px Arial; color: blue;">style</span>, 
        включенный в тег абзаца.
    </p>
    <p>Еще один абзац.</p>
    
    <!-- Дополнительный пример для наглядности -->
    <div style="background: #f0f0f0; padding: 15px; border: 2px solid #333; margin-top: 20px;">
        <h2 style="color: navy; text-align: center;">Заголовок со встроенным стилем</h2>
        <p style="font-size: 18px; line-height: 1.6; color: #444;">
            Текст внутри блока также отформатирован встроенными стилями.
            <span style="font-weight: bold; color: red;">Важное выделение</span> 
            с помощью span.
        </p>
    </div>
</body>
</html>
