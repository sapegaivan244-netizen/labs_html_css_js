<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Абсолютные единицы измерения</title>
</head>
<body>
    <!-- Абсолютные единицы из учебника [1, 123-124] -->
    <p style="font-size: 10mm;">Размер 10 миллиметров</p>
    <p style="font-size: 0.8cm;">Размер 0.8 сантиметров</p>
    <p style="font-size: 0.2in;">Размер 0.2 дюйма</p>
    <p style="font-size: 22pt;">Размер 22 пункта</p>
    
    <!-- Дополнительные примеры -->
    <div style="margin-top: 30px; border-top: 2px solid #ccc; padding-top: 20px;">
        <h3>Дополнительные примеры абсолютных единиц</h3>
        <p style="font-size: 12pt;">Размер 12 пунктов (стандартный)</p>
        <p style="font-size: 1pc;">Размер 1 пика (12pt)</p>
        <p style="font-size: 1.5pc;">Размер 1.5 пики</p>
    </div>
</body>
</html>
