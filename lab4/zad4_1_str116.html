<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Пример глобальной таблицы стилей</title>
    <style type="text/css">
        /* Глобальные стили из учебника [1, 116] */
        p { 
            font: 20 Garamond; 
        }
        span { 
            font: 26px Arial; 
            color: blue; 
        }
        
        /* Дополнительные стили для наглядности */
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #f5f5f5;
            margin: 20px;
        }
        h1 {
            color: #2c3e50;
            text-align: center;
            border-bottom: 3px solid #3498db;
            padding-bottom: 10px;
        }
        .highlight {
            background-color: #fdebd0;
            padding: 2px 5px;
            border-radius: 3px;
        }
    </style>
</head>
<body>
    <h1>Внедренная (глобальная) таблица стилей</h1>
    <p>
        Внедренная таблица стилей для элементов 
        <span>&lt;р&gt;</span> и <span>&lt;span&gt;</span>.
    </p>
    <p>
        Блок, для которого свойства стилей не заданы.
    </p>
    <p>
        Еще один абзац, на который распространяются свойства 
        <span>селектор</span> и <span>span</span>.
    </p>
</body>
</html>
