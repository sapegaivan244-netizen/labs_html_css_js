<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Параметр scoped в элементе style</title>
    <style>
        /* Глобальный стиль для всех абзацев */
        p {
            font-size: 16px;
            color: #333;
        }
    </style>
</head>
<body>
    <p>Обычный текст.</p>
    
    <!-- Начало области видимости для scoped -->
    <div style="border: 2px dashed #999; padding: 15px; margin: 10px 0;">
        <style scoped>
            /* Стили из учебника [1, 117-118] */
            p {
                font-size: 18pt; 
                color: red;
            }
        </style>
        <p>
            Текст, отформатированный с помощью таблицы стилей, 
            расположенной в техническом заголовке документа и элементе "div".
        </p>
    </div>
    <!-- Конец области видимости -->
    
    <p>Этот абзац снова с глобальным стилем (вне зоны действия scoped).</p>
</body>
</html>
