<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Новые типы HTML5</title>
</head>
<body>
    <input type="color"><br><br>
    <input type="date" min="2016-09-01" max="2017-07-05" value="2017-01-01"><br><br>
    <input type="datetime"><br><br>
    <input type="datetime-local"><br><br>
    <input type="month"><br><br>
    <input type="week"><br><br>
    <input type="time"><br><br>
    <input type="number" value="-1" min="-1" max="1" step="0.01"><br><br>
    <input type="url"><br><br>
    <input type="email"><br><br>
    <input type="tel"><br><br>
    <input type="search"><br><br>
    <input type="range" min="-10" max="10" value="5">
</body>
</html>
